services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${AUTH_DB_USER:-finance}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-finance}
    ports:
      - "5433:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-finance} -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  finance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: ${FINANCE_DB_USER:-finance}
      POSTGRES_PASSWORD: ${FINANCE_DB_PASSWORD:-finance}
    ports:
      - "5434:5432"
    volumes:
      - finance-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FINANCE_DB_USER:-finance} -d finance_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      AUTH_R2DBC_URL: r2dbc:postgresql://auth-db:5432/auth_db
      AUTH_JDBC_URL: jdbc:postgresql://auth-db:5432/auth_db
      AUTH_DB_USER: ${AUTH_DB_USER:-finance}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-finance}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-32-bytes}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-key}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8083}
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy

  finance-service:
    build:
      context: .
      dockerfile: finance-service/Dockerfile
    environment:
      FINANCE_R2DBC_URL: r2dbc:postgresql://finance-db:5432/finance_db
      FINANCE_JDBC_URL: jdbc:postgresql://finance-db:5432/finance_db
      FINANCE_DB_USER: ${FINANCE_DB_USER:-finance}
      FINANCE_DB_PASSWORD: ${FINANCE_DB_PASSWORD:-finance}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-32-bytes}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-key}
      AUTH_SERVICE_URL: http://auth-service:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8082:8082"
    depends_on:
      finance-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-32-bytes}
      FINANCE_SERVICE_URL: http://finance-service:8082
      AUTH_SERVICE_PUBLIC_URL: http://localhost:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REPORT_CACHE_TTL: ${REPORT_CACHE_TTL:-PT1M}
    ports:
      - "8083:8083"
    depends_on:
      finance-service:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  auth-data:
  finance-data:
