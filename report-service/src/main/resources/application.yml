server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: report-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: ru.mihaliks.finance.common.event

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-32-bytes}
  finance-service-url: ${FINANCE_SERVICE_URL:http://localhost:8082}
  auth-service-public-url: ${AUTH_SERVICE_PUBLIC_URL:http://localhost:8081}
  cache-ttl: ${REPORT_CACHE_TTL:PT1M}

management:
  endpoints:
    web:
      exposure:
        include: health,info
