server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: finance-service
  r2dbc:
    url: ${FINANCE_R2DBC_URL:r2dbc:postgresql://localhost:5434/finance_db}
    username: ${FINANCE_DB_USER:finance}
    password: ${FINANCE_DB_PASSWORD:finance}
  flyway:
    url: ${FINANCE_JDBC_URL:jdbc:postgresql://localhost:5434/finance_db}
    user: ${FINANCE_DB_USER:finance}
    password: ${FINANCE_DB_PASSWORD:finance}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-32-bytes}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  internal-api-key: ${INTERNAL_API_KEY:local-internal-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info
